<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F.R.I.D.A.Y</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="shell layout">
    <div class="main-col">
      <header class="header anim-rise" style="animation-delay: 0ms">
        <div class="logo-ring">
          <div class="logo-core"></div>
        </div>
        <div class="titles">
          <h1>F.R.I.D.A.Y</h1>
          <p class="tagline">Full Responsive Interface · Networked Assistant for You</p>
        </div>
        <div class="header-actions">
          <span class="pulse-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Online</span>
          <button type="button" class="btn ghost anim-rise" id="btnClear" style="animation-delay: 80ms">Clear chat</button>
        </div>
      </header>

      <main class="main anim-rise" style="animation-delay: 120ms">
        <div class="chat-wrap">
          <div class="chat-scroll" id="chat">
            <div class="welcome">
              <p class="welcome-line anim-fade">Systems nominal, sir.</p>
              <p class="welcome-sub anim-fade" style="animation-delay: 200ms">Ask anything — watch the neural trace while tokens stream.</p>
            </div>
          </div>
          <div class="thinking" id="thinking" hidden>
            <div class="thinking-bars">
              <span></span><span></span><span></span>
            </div>
            <span id="thinkingLabel">Processing</span>
          </div>
        </div>

        <form class="composer anim-rise" id="form" style="animation-delay: 180ms" autocomplete="off">
          <div class="input-glow"></div>
          <textarea id="input" rows="1" placeholder="Message FRIDAY…" maxlength="16000"></textarea>
          <button type="button" class="btn voice" id="btnVoice" aria-label="Voice Mode" title="Hold to speak or click to dictate">
            <svg class="voice-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
          </button>
          <button type="submit" class="btn send" id="btnSend" aria-label="Send">
            <span class="send-icon"></span>
          </button>
        </form>
      </main>

      <footer class="footer anim-rise" style="animation-delay: 220ms">
        <span>Local · Same brain as CLI · Voice stack shown in telemetry</span>
      </footer>
    </div>

    <aside class="telemetry anim-rise" style="animation-delay: 100ms" aria-label="Neural telemetry">
      <div class="telemetry-head">
        <span class="telemetry-icon"></span>
        <h2>Neural telemetry</h2>
      </div>

      <section class="stack-card" aria-labelledby="voice-h">
        <h3 id="voice-h">Voice stack</h3>
        <dl class="spec-grid" id="voiceStack">
          <div class="spec-skel"></div>
        </dl>
      </section>

      <section class="stack-card" aria-labelledby="llm-h">
        <h3 id="llm-h">Language uplink</h3>
        <dl class="spec-grid" id="llmStack">
          <div class="spec-skel"></div>
        </dl>
      </section>

      <section class="stack-card feed-card">
        <div class="feed-head">
          <span class="feed-pulse"></span>
          <h3>Backend trace</h3>
        </div>
        <div class="phase-feed" id="phaseFeed"></div>
      </section>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
