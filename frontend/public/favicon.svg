<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0f1a13"/>

  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="12" stroke="#4a7c59" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Inner orb -->
  <circle cx="16" cy="16" r="7" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Neural lines -->
  <line x1="16" y1="4"  x2="16" y2="9"  stroke="#4a7c59" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="23" x2="16" y2="28" stroke="#4a7c59" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="4"  y1="16" x2="9"  y2="16" stroke="#4a7c59" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="23" y1="16" x2="28" y2="16" stroke="#4a7c59" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Diagonal lines -->
  <line x1="7.5"  y1="7.5"  x2="11"  y2="11"  stroke="#4a7c59" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="21"   y1="21"   x2="24.5" y2="24.5" stroke="#4a7c59" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="24.5" y1="7.5"  x2="21"  y2="11"  stroke="#4a7c59" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="11"   y1="21"   x2="7.5"  y2="24.5" stroke="#4a7c59" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bright center dot -->
  <circle cx="16" cy="16" r="3" fill="#a8d5b5" filter="url(#glow)"/>

  <defs>
    <radialGradient id="grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#7ecb98"/>
      <stop offset="100%" stop-color="#2d5e3e"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>